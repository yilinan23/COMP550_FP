experiment:
  name: benchmark_vs_rl
  seed: 42

inputs:
  benchmark:
    path: data/generated/agreement_large_controlled.jsonl
    phenomenon: agreement
  rl:
    path: data/generated/syntax_rl_distribution_aware_large.jsonl
    phenomenon: agreement

models:
  - id: hf_tiny_gpt2
    label: Hugging Face tiny GPT-2
    enabled: true
    provider: huggingface
    name: sshleifer/tiny-gpt2
    device: cpu
    normalize_by_token_count: true
    cache_dir: outputs/cache/huggingface

  - id: hf_distilgpt2
    label: Hugging Face DistilGPT-2
    enabled: true
    provider: huggingface
    name: distilgpt2
    device: cpu
    normalize_by_token_count: true
    cache_dir: outputs/cache/huggingface

  - id: hf_gpt2
    label: Hugging Face GPT-2
    enabled: true
    provider: huggingface
    name: gpt2
    device: cpu
    normalize_by_token_count: true
    cache_dir: outputs/cache/huggingface

  - id: hf_mistral_7b_instruct
    label: Mistral 7B Instruct v0.3
    enabled: false
    provider: huggingface
    name: mistralai/Mistral-7B-Instruct-v0.3
    device: auto
    normalize_by_token_count: true
    cache_dir: outputs/cache/huggingface
    tokenizer_use_fast: false
    torch_dtype: auto
    low_cpu_mem_usage: true
    device_map: auto
    offload_folder: outputs/cache/huggingface_offload/mistral_full
    max_examples_per_dataset:

  - id: hf_smollm2_360m_instruct
    label: SmolLM2 360M Instruct
    enabled: false
    provider: huggingface
    name: HuggingFaceTB/SmolLM2-360M-Instruct
    device: auto
    normalize_by_token_count: true
    cache_dir: outputs/cache/huggingface
    torch_dtype: auto
    low_cpu_mem_usage: true
    max_examples_per_dataset:

evaluation:
  group_by:
    - template_type
    - subtype
    - dependency_distance_bucket
    - clause_depth
  near_failure_margin: 0.01
  continue_on_error: true
  concentration_top_n: 3
  concentration_failure_share_threshold: 0.6

outputs:
  comparison_dir: outputs/benchmark_vs_rl
  figures_dir: outputs/benchmark_vs_rl/figures
  log_dir: outputs/logs
